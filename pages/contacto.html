<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto | Amor de Cielo</title>
    <meta name="description" content="¿Tenés dudas o consultas? Contactate con nosotros. Estamos para ayudarte">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg colorfondonav">
            <div class="container-fluid">
                <a class="navbar-brand" href="../index.html">
                    <span class="h3 mb-0">Amor de Cielo</span>
                </a>    
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item"><a class="nav-link navlink" href="../index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link navlink" href="./productos.html">Productos</a></li>
                        <li class="nav-item"><a class="nav-link navlink active" href="./contacto.html">Contacto</a></li>
                        <li class="nav-item">
                            <img src="../img/carrito-de-compras.png" class="carrito-icono ms-lg-3" alt="Icono de carrito de compras">
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="seccion-contacto container my-5">
        <h1>Contactate con nosotros</h1>
        <p class="mb-4">¿En qué podemos ayudarte? Dejanos tu mensaje y te responderemos a la brevedad.</p>
          <form class="formulario-bebe shadow-sm p-4 rounded-4 bg-light">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre y apellido</label>
                <input type="text" id="nombre" class="form-control" required />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email de contacto</label>
                <input type="email" id="email" class="form-control" required />
            </div>
            <div class="mb-3">
                <label for="mensaje" class="form-label">Escribinos</label>
                <textarea id="mensaje" class="form-control" rows="4" required></textarea>
            </div>
            <button type="submit" class="botton border-0 w-100">Enviar Mensaje</button>
        </form>
    </main>
    <footer class="fondofooter">
        <div class="redes-sociales">
            <a href="https://instagram.com" target="_blank"><img src="../img/instagram.png" alt="Seguinos en Instagram"></a>
            <a href="https://facebook.com" target="_blank"><img src="../img/facebook.png" alt="Seguinos en Facebook"></a>
            <a href="https://wa.me/tu-numero" target="_blank"><img src="../img/icono whatsapp.png" alt="Escribinos por WhatsApp"></a>
        </div>
        <p>© 2026 Amor de Cielo - Ropita para bebés hecha con amor</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
